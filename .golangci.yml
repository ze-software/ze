# golangci-lint configuration for ZeBGP (v2 format)
version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Core linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - gocritic
    - gosec
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - noctx
    - bodyclose
    # dupl disabled: plugin CLI entry points (cmd/ze/bgp/plugin_*.go)
    # intentionally follow the same pattern for consistency
    # - dupl
    - errorlint
    - exhaustive
    - forcetypeassert
    - goconst
    - godot
    - nilerr
    - nilnil
    - tparallel
    - wastedassign

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  goimports:
    local-prefixes:
      - codeberg.org/thomas-mangin/zebgp

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    enabled-checks:
      - hugeParam
      - rangeValCopy
    settings:
      hugeParam:
        sizeThreshold: 80
      rangeValCopy:
        sizeThreshold: 128

  gosec:
    excludes:
      - G104

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true

  # dupl: disabled (see linters section)

  goconst:
    min-len: 3
    min-occurrences: 3

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gosec

    - path: cmd/
      linters:
        - forbidigo

  max-issues-per-linter: 50
  max-same-issues: 10

output:
  format: colored-line-number
  sort-results: true
