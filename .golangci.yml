# golangci-lint configuration for ZeBGP

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - gofmt
    - goimports
    - gocritic
    - gosec
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - exportloopref
    - noctx
    - bodyclose
    - dupl
    - errorlint
    - exhaustive
    - forcetypeassert
    - goconst
    - godot
    - nilerr
    - nilnil
    - tenv
    - tparallel
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/exa-networks/zebgp

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  gosec:
    excludes:
      - G104  # Audit errors not checked (we use errcheck)

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true

  dupl:
    threshold: 150

  goconst:
    min-len: 3
    min-occurrences: 3

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Test files can have longer functions
    - path: _test\.go
      linters:
        - dupl
        - goconst

    # Allow fmt.Print in cmd/
    - path: cmd/
      linters:
        - forbidigo

  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    - format: colored-line-number
  sort-results: true
