l2tp {
    enabled true;
    auth-method none;
    allow-no-auth true;
    hello-interval 5;
    max-tunnels 4;
    max-sessions 4;
    pool {
        ipv4 {
            gateway 10.100.0.1;
            start 10.100.0.2;
            end 10.100.0.10;
            dns-primary 8.8.8.8;
            dns-secondary 8.8.4.4;
        }
    }
}
environment {
    l2tp {
        server main {
            ip 172.29.0.2;
            port 1701;
        }
    }
}
