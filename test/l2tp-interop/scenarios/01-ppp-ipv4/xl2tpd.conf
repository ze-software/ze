[global]
port = 1702
auth file = /etc/xl2tpd/l2tp-secrets
debug tunnel = yes
debug state = yes
debug packet = yes
debug avp = yes

[lac ze]
lns = 172.29.0.2
autodial = yes
redial = yes
redial timeout = 1
max redials = 10
require authentication = no
ppp debug = yes
pppoptfile = /etc/ppp/options.l2tpd.client
length bit = yes
