l2tp {
    enabled true;
    auth-method none;
    allow-no-auth true;
    hello-interval 5;
    max-tunnels 4;
    max-sessions 4;
    pool {
        ipv4 {
            gateway 10.100.0.1;
            start 10.100.0.2;
            end 10.100.0.10;
            dns-primary 8.8.8.8;
            dns-secondary 8.8.4.4;
        }
    }
}
environment {
    l2tp {
        server main {
            ip 172.29.0.2;
            port 1701;
        }
    }
}
redistribute {
    import l2tp;
}
bgp {
    peer frr {
        connection {
            remote { ip 172.29.0.4; }
            local  { ip 172.29.0.2; }
        }
        session {
            asn { local 65001; remote 65002; }
            router-id 172.29.0.2;
            family {
                ipv4/unicast { prefix { maximum 10000; } }
            }
        }
    }
}
