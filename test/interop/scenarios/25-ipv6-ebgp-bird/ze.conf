plugin {
	external announce-routes {
		run /etc/ze/announce-v6.py;
		encoder json;
	}
}
bgp {
	peer bird {
		remote {
			ip 172.30.0.4
			as 65002
		}
		local {
			ip 172.30.0.2
			as 65001
		}
		router-id 172.30.0.2
		family {
			ipv4/unicast { prefix { maximum 10000; } }
			ipv6/unicast { prefix { maximum 10000; } }
		}
		process announce-routes {
		}
	}
}
