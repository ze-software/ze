plugin {
	external rib {
		use bgp-rib;
	}
	external announce-routes {
		run /etc/ze/announce-gobgp.py;
		encoder json;
	}
}
bgp {
	peer peer1 {
		connection {
			remote { ip 172.30.0.5; }
			local  { ip 172.30.0.2; }
		}
		session {
			asn { local 65001; remote 65002; }
			router-id 172.30.0.2;
			family {
				ipv4/unicast { prefix { maximum 10000; } }
			}
		}
		process announce-routes {
		}
	}
}
