plugin {
	external announce-routes {
		run /etc/ze/announce-vpn.py;
		encoder json;
	}
}
bgp {
	peer frr {
		remote {
			ip 172.30.0.3
			as 65002
		}
		local {
			ip 172.30.0.2
			as 65001
		}
		router-id 172.30.0.2
		family {
			ipv4/unicast { prefix { maximum 10000; } }
			ipv4/mpls-vpn { prefix { maximum 10000; } }
		}
		process announce-routes {
		}
	}
}
