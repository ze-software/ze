plugin {
	external rib {
		run "ze plugin bgp-rib";
	}
	external route-refresh {
		run "ze plugin bgp-route-refresh";
	}
	external announce-routes {
		run /etc/ze/announce-rr.py;
		encoder json;
	}
}
bgp {
	peer 172.30.0.3 {
		router-id 172.30.0.2;
		local-address 172.30.0.2;
		local-as 65001;
		peer-as 65002;
		family {
			ipv4/unicast;
		}
		process announce-routes {
		}
	}
}
