log stderr all;
router id 172.30.0.4;

protocol device {
}

protocol static static_routes {
	ipv4;
	route 10.0.0.0/24 blackhole;
	route 10.0.1.0/24 blackhole;
	route 10.0.2.0/24 blackhole;
}

protocol bgp ze_peer {
	local 172.30.0.4 as 65002;
	neighbor 172.30.0.2 as 65001;
	ipv4 {
		import all;
		export where proto = "static_routes";
	};
}
