bfd {
	enabled true;
	profile fast {
		detect-multiplier 3;
		desired-min-tx-us 300000;
		required-min-rx-us 300000;
	}
}

bgp {
	peer peer1 {
		connection {
			remote {
				ip 172.30.0.3;
			}
			local {
				ip 172.30.0.2;
			}
			bfd {
				enabled true;
				mode single-hop;
				profile fast;
			}
		}
		session {
			asn {
				local 65001;
				remote 65002;
			}
			router-id 172.30.0.2;
			family {
				ipv4/unicast { prefix { maximum 10000; } }
			}
			capability {
				graceful-restart disable;
			}
		}
	}
}
