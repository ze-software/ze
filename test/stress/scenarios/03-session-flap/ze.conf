plugin {
	external rib {
		use bgp-rib;
	}
}
bgp {
	router-id 172.31.0.2;
	session {
		asn {
			local 65001;
		}
	}
	peer injector {
		connection {
			remote {
				ip 172.31.0.3;
			}
			local {
				ip 172.31.0.2;
			}
		}
		session {
			asn {
				remote 65100;
			}
			family {
				ipv4/unicast { prefix { maximum 200000; } }
			}
		}
	}
}
