plugin {
	external lg-lab {
		run ./lg-lab.py
		encoder json
	}
	external rib {
		use bgp-rib
		encoder json
	}
}

environment {
	tcp {
		attempts 3
	}
	looking-glass {
		enabled true
		server main {
			ip ${LG_IP}
			port ${LG_PORT}
		}
	}
}

bgp {
	peer peer1 {
		connection {
			remote {
				ip 127.0.0.1
			}
			local {
				ip 127.0.0.1
				accept false
			}
		}
		session {
			asn {
				local 65000
				remote 65000
			}
			router-id 10.0.0.1
			family {
				ipv4/unicast { prefix { maximum 10000; } }
			}
			capability {
				graceful-restart disable
			}
		}
		behavior {
			group-updates disable
		}

		process lg-lab {
		}
		process rib {
			receive [ state ]
			send [ update ]
		}
	}
}
