plugin {
	external rib {
		run "ze plugin bgp-rib"
	}
}
bgp {
	group default {
		peer peer-1 {
			router-id 1.1.1.1
			local {
				as 65001
				ip 10.0.0.2
			}
			remote {
				as 65002
				ip 10.0.0.1
			}
			capability {
				extended-message enable
				route-refresh enable
			}
			process rib {
				receive [ update ]
				send [ update refresh ]
			}
		}
	}
}
