plugin {
	external rib {
		run "ze plugin bgp-rib";
	}
}
bgp {
	peer 10.0.0.1 {
		local-address 10.0.0.2;
		local-as 65001;
		peer-as 65002;
		router-id 1.1.1.1;
		capability {
			extended-message enable;
			route-refresh enable;
		}
		process rib {
			receive [ update ];
			send [ update state refresh ];
		}
	}
}
