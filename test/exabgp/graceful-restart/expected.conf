plugin {
	external rib {
		run "ze plugin bgp-rib"
	}
}
bgp {
	group default {
		peer peer-1 {
			connection {
				local {
					ip 10.0.0.2
				}
				remote {
					ip 10.0.0.1
				}
			}
			session {
				router-id 1.1.1.1
				asn {
					local 65001
					remote 65002
				}
				capability {
					extended-message enable
					graceful-restart 120
				}
			}
			process rib {
				receive [ update ]
				send [ update ]
			}
		}
	}
}
