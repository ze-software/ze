bgp {
	group default {
		peer peer-1 {
			connection {
				local {
					ip 10.0.0.2
				}
				remote {
					ip 10.0.0.1
				}
			}
			session {
				router-id 1.1.1.1
				asn {
					local 65001
					remote 65002
				}
				capability {
					extended-message enable
				}
			}
			timer {
				receive-hold-time 180
			}
		}
	}
}
