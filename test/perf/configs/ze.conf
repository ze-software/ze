plugin {
    external bgp-rs {
        use bgp-rs;
    }
}

bgp {
    peer perf-sender {
        connection {
            remote { ip 172.31.0.10; }
            local  { ip 172.31.0.2; port 1790; connect false; }
        }
        session {
            asn { local 65000; remote 65001; }
            router-id 10.0.0.1;
            family {
                ipv4/unicast { prefix { maximum 1000000; } }
                ipv6/unicast { prefix { maximum 1000000; } }
            }
        }
    }
    peer perf-receiver {
        connection {
            remote { ip 172.31.0.11; }
            local  { ip 172.31.0.2; port 1791; connect false; }
        }
        session {
            asn { local 65000; remote 65002; }
            router-id 10.0.0.1;
            family {
                ipv4/unicast { prefix { maximum 1000000; } }
                ipv6/unicast { prefix { maximum 1000000; } }
            }
        }
    }
}
