plugin {
    external bgp-rs {
        run "ze.bgp-rs";
    }
}

bgp {
    peer perf-sender {
        description "perf benchmark sender";
        router-id 10.0.0.1;
        remote {
            ip 172.31.0.10;
            as 65001;
        }
        local {
            ip 172.31.0.2;
            as 65000;
        }
        port 1790;
        connection passive;
        family {
            ipv4/unicast {
                prefix { maximum 1000000; }
            }
            ipv6/unicast {
                prefix { maximum 1000000; }
            }
        }
    }
    peer perf-receiver {
        description "perf benchmark receiver";
        router-id 10.0.0.1;
        remote {
            ip 172.31.0.11;
            as 65002;
        }
        local {
            ip 172.31.0.2;
            as 65000;
        }
        port 1791;
        connection passive;
        family {
            ipv4/unicast {
                prefix { maximum 1000000; }
            }
            ipv6/unicast {
                prefix { maximum 1000000; }
            }
        }
    }
}
