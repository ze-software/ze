frr version 10.3
frr defaults traditional
hostname frr-perf
log syslog informational

router bgp 65000
 bgp router-id 172.31.0.3
 neighbor 172.31.0.10 remote-as 65001
 neighbor 172.31.0.10 passive
 neighbor 172.31.0.11 remote-as 65002
 neighbor 172.31.0.11 passive
 address-family ipv4 unicast
  neighbor 172.31.0.10 route-map PERMIT in
  neighbor 172.31.0.10 route-map PERMIT out
  neighbor 172.31.0.11 route-map PERMIT in
  neighbor 172.31.0.11 route-map PERMIT out
 exit-address-family

route-map PERMIT permit 10
