log syslog all;
router id 172.31.0.4;

protocol device {}

protocol bgp sender {
	local 172.31.0.4 as 65000;
	neighbor 172.31.0.10 as 65001;
	passive;
	ipv4 {
		import all;
		export all;
	};
}

protocol bgp receiver {
	local 172.31.0.4 as 65000;
	neighbor 172.31.0.11 as 65002;
	passive;
	ipv4 {
		import all;
		export all;
	};
}
