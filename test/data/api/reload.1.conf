process announce-routes {
	run ./reload.run;
	encoder json;
}
peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	hold-time 600;
	group-updates disable;

	family {
		ipv4/unicast;
	}
	capability {
		graceful-restart;
	}
	announce {
		ipv4 {
			unicast 1.0.0.0/24 next-hop 4.0.0.0;
			unicast 2.0.0.0/24 next-hop 4.0.0.0;
		}
	}
	api announce-routes {
	}
}
