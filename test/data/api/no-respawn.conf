process one-shot {
	run ./no-respawn-1.run;
	encoder json;
	respawn disable;
}
process respawn {
	run ./no-respawn-2.run;
	encoder json;
}
peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates disable;

	family {
		ipv4 unicast;
	}
	capability {
		graceful-restart;
	}
	api {
		processes [ one-shot respawn ];
	}
}
