process expecting-a-keepalive {
	run ./api.receive.run;
	encoder json;
}
process expecting-no-data {
	run ./api.nothing.run;
	encoder json;
}
template {
	group controller {

		family {
			ipv4/nlri-mpls;
			ipv4/unicast;
		}
		api expecting-a-keepalive {
			content {
				format parsed;
			}
			receive {
				keepalive;
				update;
			}
			send {
				keepalive;
				update;
			}
		}
		api expecting-no-data {
		}
	}
}
peer 127.0.0.1 {
	inherit controller;
	router-id 127.0.0.123;
	local-address 127.0.0.1;
	local-as 65535;
	peer-as 65535;
	group-updates disable;
}
