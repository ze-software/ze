process private {
	run ./multiple-private.run;
	encoder text;
}
process public {
	run ./multiple-public.run;
	encoder text;
}
template {
	group private {
		local-as 2;
		peer-as 2;
		group-updates disable;

		family {
			ipv4/unicast;
		}
		api private {
		}
	}
	group public {
		local-as 1;
		peer-as 1;
		group-updates disable;

		family {
			ipv4/unicast;
		}
		api public {
		}
	}
}
peer 127.0.0.1 {
	inherit public;
	router-id 1.2.3.4;
	local-address 127.0.0.1;
}
peer 192.168.0.1 {
	inherit private;
	router-id 1.2.3.4;
	local-address 127.0.0.1;
}
