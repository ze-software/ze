plugin {
	external announce-routes {
		run ./attributes-path.run;
		encoder text;
	}
}
peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 300;
	peer-as 300;

	family {
		ipv4/unicast;
		ipv6/unicast;
	}
	capability {
		route-refresh;
		add-path send/receive;
	}
	process announce-routes {
		receive {
			state;
		}
	}
}
