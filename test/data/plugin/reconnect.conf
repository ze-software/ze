plugin announce-routes {
	run ./reconnect.run;
	encoder json;
}
plugin persist {
	run "zebgp plugin persist";
	encoder json;
}
peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates disable;

	family {
		ipv4/unicast;
	}
	capability {
		graceful-restart disable;
	}
	process announce-routes {
	}
	process persist {
		receive { sent; state; }
		send { update; }
	}
}
