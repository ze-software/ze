plugin {
	external gr {
		run "zebgp plugin gr";
		encoder json;
	}
	external rib {
		run "zebgp plugin rib";
		encoder json;
	}
}


environment {
	tcp {
		attempts 3;
	}
}

peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates disable;

	family {
		ipv4/unicast;
	}
	capability {
		graceful-restart {
			restart-time 120;
		}
	}

	static {
		route 192.168.1.0/24 next-hop 10.0.0.1;
	}

	process rib {
		receive { sent; state; }
		send { update; }
	}
}
