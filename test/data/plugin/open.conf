process announce-routes {
	run ./open.run;
	encoder json;
}
peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates disable;

	family {
		ipv4/unicast;
	}
	capability {
		asn4 enable;
		route-refresh enable;
		graceful-restart 360;
		add-path send/receive;
		multi-session enable;
		operational enable;
		aigp enable;
	}
	nexthop {
		ipv4/unicast ipv6;
		ipv6/unicast ipv4;
	}
	api announce-routes {
		content {
			format full;
		}
		receive {
			open;
			update;
		}
	}
}
