plugin blocklist-10.0.0.2 {
	run ./blocklist.run;
	encoder text;
}
plugin blocklist-10.0.0.3 {
	run ./blocklist.run;
	encoder text;
}
template {
	group blocklist {
		router-id 10.0.0.17;
		local-address 10.0.0.17;
		local-as 64512;
		peer-as 64512;
		hold-time 180;
		group-updates enable;

		family {
			ipv4/unicast;
			ipv6/unicast;
		}
		capability {
			route-refresh enable;
			graceful-restart 1200;
			operational enable;
		}
	}
}
peer 10.0.0.2 {
	inherit blocklist;
	process blocklist-10.0.0.2 {
	}
}
peer 10.0.0.3 {
	inherit blocklist;
	process blocklist-10.0.0.3 {
	}
}
