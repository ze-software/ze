plugin {
	external health-test {
		run ./health.run;
		encoder text;
	}
}
template {
	group controller {

		family {
			ipv4/unicast;
		}
		process health-test {
		}
	}
}
peer 127.0.0.1 {
	inherit controller;
	router-id 127.0.0.1;
	local-address 127.0.0.1;
	local-as 65535;
	peer-as 65535;
	group-updates disable;
}
