bgp {
	peer peer3 {
		connection {
			remote {
				ip 10.0.0.3
			}
			local {
				ip 192.0.2.92
			}
		}
		session {
			asn {
				local 65533
				remote 65533
			}
			router-id 192.0.2.92
		}
		behavior {
			group-updates disable
		}
		description "a quagga test peer"
		update {
			attribute {
				origin igp
				next-hop 192.0.2.92
				local-preference 10
				community 0x87654321
			}
			nlri {
				ipv4/unicast add 10.0.5.0/24
			}
		}
	}
}
