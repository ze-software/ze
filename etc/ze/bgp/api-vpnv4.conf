plugin {
	external announce-routes {
		run ./run/api-vpnv4.run;
		encoder json;
	}
}
bgp {
	peer 127.0.0.1 {
		router-id 1.2.3.4;
		local-address 127.0.0.1;
		local-as 1;
		peer-as 1;
		group-updates disable;

		family {
			ipv4/mpls-vpn;
		}
		capability {
			graceful-restart;
		}
		process announce-routes {
		}
	}
}
