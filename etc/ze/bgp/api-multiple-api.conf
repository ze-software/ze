plugin {
	external private {
		run ./run/api-multiple-private.run
		encoder text
	}
	external public {
		run ./run/api-multiple-public.run
		encoder text
	}
}
bgp {
	group public {
		local-as 1
		peer-as 1
		group-updates disable

		family {
			ipv4/unicast
		}
		process public {
		}

		peer 127.0.0.1 {
			router-id 1.2.3.4
			local-address 127.0.0.1
		}
	}
	group private {
		local-as 2
		peer-as 2
		group-updates disable

		family {
			ipv4/unicast
		}
		process private {
		}

		peer 192.168.0.1 {
			router-id 1.2.3.4
			local-address 127.0.0.1
		}
	}
}
