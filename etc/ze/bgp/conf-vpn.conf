bgp {
	peer 127.0.0.1 {
		router-id 127.1.1.1
		local-address 127.0.0.1
		local-as 65000
		peer-as 65000
		hold-time 180
		group-updates disable
		capability {
			route-refresh
			graceful-restart
		}
		announce {
			ipv4 {
				mpls-vpn 10.0.0.0/24 next-hop 200.10.0.101 extended-community "0x0002fde800000001 0x0002271000000001" label 1000 rd 65000:1 split /25
				mpls-vpn 20.0.0.0/24 next-hop 200.10.0.101 extended-community "0x0002fde800000001 0x0002271000000001" label 1000 rd 65000:1 split /25
			}
		}
	}
}
