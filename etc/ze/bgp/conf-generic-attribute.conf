peer 127.0.0.1 {
	router-id 10.0.0.10;
	local-address 127.0.0.1;
	local-as 65533;
	peer-as 65533;
	group-updates disable;

	family {
		ipv4/unicast;
	}
	announce {
		ipv4 {
			unicast 100.100.100.100 next-hop 192.168.1.100 attribute "0x04 0x80 0x00000064";
			unicast 101.101.101.101 next-hop 192.168.1.100 attribute "0x99 0x60 0x00000064";
			unicast 111.111.111.111 next-hop 192.168.1.100 attribute "0x99 0x70 0x00000064";
		}
	}
}
