peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates disable;

	family {
		ipv4/flow;
		ipv4/flow-vpn;
		ipv6/flow;
	}
	flow {
		route a-vpn-route {
			rd 65535:65536;
			next-hop 5.6.7.8;
			match {
				source 10.0.0.3/32;
			}
			then {
				redirect-to-nexthop;
			}
		}
		route another {
			match {
				destination-port =3128;
				protocol tcp;
				source 10.0.0.0/24;
			}
			then {
				rate-limit 9600;
			}
		}
		route check-tcp-flags {
			match {
				destination 10.0.0.2/32;
				destination-port =3128;
				protocol tcp;
				source 10.0.0.1/32;
				tcp-flags [ SYN RST&FIN&!=push ];
			}
			then {
				discard;
			}
		}
		route first-redirect {
			match {
				destination 192.168.0.1/32;
				destination-port [ >8080&<8088 =3128 ];
				port [ =80 =8080 ];
				protocol [ udp tcp ];
				source 10.0.0.9/32;
				source-port >1024;
			}
			then {
				redirect 65500:12345;
			}
		}
		route first-vpn-route {
			rd 65535:65536;
			match {
				source 10.0.0.1/32;
			}
			then {
				discard;
			}
		}
		route give-me-a-name {
			match {
				destination 10.0.0.2/32;
				destination-port =3128;
				protocol tcp;
				source 10.0.0.1/32;
			}
			then {
				community [ 30740:0 30740:30740 ];
				discard;
			}
		}
		route ipv6 {
			match {
				destination 2a02:b80:15::7aca:39ff:feae:a87a/128/0;
				flow-label 2013;
				next-header udp;
				source ::1/128/120;
				traffic-class 101;
			}
			then {
				discard;
			}
		}
		route legal-intercept {
			match {
				source 10.0.0.2/32;
			}
			then {
				copy 1.2.3.4;
			}
		}
		route neq-operator {
			match {
				destination 192.168.0.1/32;
				destination-port [ !=443 ];
				port [ !=0 ];
				protocol [ !=tcp ];
				source 10.0.0.10/32;
				source-port [ !=80 !=8080 ];
			}
			then {
				discard;
			}
		}
		route second-redirect {
			match {
				destination 192.168.0.1/32;
				destination-port [ >8080&<8088 =3128 ];
				port [ =80 =8080 ];
				protocol [ udp tcp ];
				source 10.0.0.2/32;
				source-port >1024;
			}
			then {
				redirect 258:33756718;
			}
		}
		route set-dscp {
			match {
				packet-length [ >200&<300 >400&<500 ];
			}
			then {
				mark 10;
			}
		}
		route take-action {
			match {
				fragment [ last-fragment ];
			}
			then {
				action sample-terminal;
			}
		}
		route third-redirect {
			match {
				destination 192.168.0.1/32;
			}
			then {
				redirect 1.2.3.4;
			}
		}
	}
}
