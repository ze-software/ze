plugin {
	external mvpn {
		run ./run/api-mvpn.run;
		encoder json;
	}
}
bgp {
	peer 127.0.0.1 {
		router-id 32.32.32.32;
		local-address 127.0.0.1;
		local-as 65000;
		peer-as 65000;
		group-updates disable;

		family {
			ipv4/mcast-vpn;
			ipv6/mcast-vpn;
		}
		auto-flush enable;
		process mvpn {
		}
	}
}
