{{define "input_number"}}
<input type="number" class="ze-field-input{{if .Value}} ze-field-set{{end}}" name="value" value="{{.Value}}" inputmode="numeric"
       hx-post="/config/set/{{.Path}}" hx-trigger="blur changed" hx-swap="none"
       hx-vals='{"leaf":"{{.Leaf}}"}'
       {{- if .Min}} min="{{.Min}}"{{end}}
       {{- if .Max}} max="{{.Max}}"{{end}}
       {{- if and (not .Value) .Default}} placeholder="{{.Default}}"
       {{- else if and (not .Value) .Description}} placeholder="{{.Description}}"{{end}}>
{{- if .Value}}<span class="ze-field-tag ze-field-tag-set">set</span>
{{- else if .Default}}<span class="ze-field-tag ze-field-tag-default">default</span>
{{- end}}
{{end}}
