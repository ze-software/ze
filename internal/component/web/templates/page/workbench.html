<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/cli.js"></script>
<script src="/assets/htmx.min.js"></script>
<script src="/assets/sse-client.js"></script>
<script src="/assets/notification.js"></script>
</head>
<body class="ui-workbench">
<div class="workbench-shell" id="workbench-shell" data-ui-mode="workbench">

  <header class="workbench-topbar" id="workbench-topbar">
    {{template "workbench_topbar" .}}
  </header>

  <nav class="workbench-nav" id="workbench-nav" aria-label="Workbench sections">
    {{template "workbench_nav" .}}
  </nav>

  <main class="workbench-workspace" id="workbench-workspace">
    {{.Content}}
  </main>

  <aside class="workbench-notifications" id="notification-bar">
    {{.NotificationHTML}}
  </aside>

  {{template "commit_bar" .}}
  {{template "cli_bar" .}}

</div>
<div id="tool-overlays" class="tool-overlays"></div>
<div id="notification-area" class="notification-area"></div>

{{template "diff_modal" .}}
{{template "error_panel" .}}

</body>
</html>
