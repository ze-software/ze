{{define "tool_ping"}}
<div class="wb-tool-page">
  <h2 class="wb-form-title">Ping</h2>
  <form class="wb-tool-form" method="post" action="/show/tools/ping/" hx-post="/show/tools/ping/" hx-target="#tool-result" hx-swap="innerHTML">
    <div class="wb-form-field">
      <label for="field-destination" class="wb-form-label wb-form-label--required">Destination</label>
      <input type="text" id="field-destination" name="destination" class="wb-form-input" placeholder="192.0.2.1" required>
      <span class="wb-form-description">IP address to ping</span>
    </div>
    <div class="wb-form-field">
      <label for="field-count" class="wb-form-label">Count</label>
      <input type="number" id="field-count" name="count" class="wb-form-input" value="5" min="1" max="100">
      <span class="wb-form-description">Number of probes (1-100, default 5)</span>
    </div>
    <div class="wb-form-field">
      <label for="field-size" class="wb-form-label">Packet Size</label>
      <input type="number" id="field-size" name="size" class="wb-form-input" value="64" min="1" max="65535">
      <span class="wb-form-description">Packet size in bytes</span>
    </div>
    <div class="wb-form-field">
      <label for="field-timeout" class="wb-form-label">Timeout</label>
      <input type="number" id="field-timeout" name="timeout" class="wb-form-input" value="5" min="1" max="30">
      <span class="wb-form-description">Timeout in seconds (1-30, default 5)</span>
    </div>
    <div class="wb-form-actions">
      <button type="submit" class="wb-form-save">Run</button>
    </div>
  </form>
  <div id="tool-result" class="wb-tool-result">
    {{if .Error}}<div class="wb-tool-error">{{.Error}}</div>{{end}}
    {{if .Output}}<pre class="wb-tool-output">{{.Output}}</pre>{{end}}
  </div>
</div>
{{end}}
