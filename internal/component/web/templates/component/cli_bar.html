{{define "cli_bar"}}
<footer class="cli-bar" id="cli-bar">
  <div class="cli-path-bar" id="cli-path-bar">{{.CLIPathBar}}</div>
  <div class="cli-input-row">
    <span class="cli-prompt" id="cli-prompt">{{.CLIPrompt}}</span>
    <input type="text" class="cli-input" id="cli-input"
           placeholder="type a command..."
           autocomplete="off" spellcheck="false"
           name="command">
    <div class="cli-completions" id="cli-completions" style="display:none"></div>
  </div>
  <span id="cli-context-path" style="display:none">{{.CLIContextPath}}</span>
</footer>
{{end}}
