{{define "dashboard_events"}}
<div class="wb-table-container">
  <h2 class="wb-form-title">Recent Events</h2>
  <div class="wb-table-toolbar">
    <form method="get" action="/show/events/">
      <select name="namespace" class="wb-form-input" onchange="this.form.submit()" aria-label="Namespace filter">
        <option value="">All Namespaces</option>
        {{range .Namespaces}}<option value="{{.}}"{{if eq . $.SelectedNS}} selected{{end}}>{{.}}</option>{{end}}
      </select>
    </form>
  </div>
  {{if .Rows}}
  <table class="wb-table">
    <thead>
      <tr>
        {{range .Columns}}<th class="wb-table-col">{{.Label}}</th>{{end}}
      </tr>
    </thead>
    <tbody>
      {{range .Rows}}
      <tr class="wb-table-row">
        {{range .Cells}}<td class="wb-table-cell">{{.}}</td>{{end}}
      </tr>
      {{end}}
    </tbody>
  </table>
  {{else}}
  <div class="wb-table-empty">
    <div class="wb-table-empty-content">
      <p class="wb-table-empty-message">{{.EmptyMessage}}</p>
      {{if .EmptyHint}}<p class="wb-table-empty-hint">{{.EmptyHint}}</p>{{end}}
    </div>
  </div>
  {{end}}
</div>
{{end}}
