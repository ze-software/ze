{{define "add_form_overlay"}}
<div class="add-entry-overlay" id="add-entry-overlay" onclick="if(event.target===this)this.remove()">
  <div class="add-entry-card">
    <h3>New {{.ListName}}</h3>
    <form hx-post="{{.AddURL}}" hx-target="#detail" hx-swap="innerHTML"
          hx-on::after-request="document.getElementById('add-entry-overlay')?.remove()">
      {{if .Keyless}}
        {{if .DisplayKey}}
      <div class="add-entry-row">
        <label class="add-entry-label">{{.DisplayKey}}</label>
        <input type="text" class="add-entry-input" name="field:{{.DisplayKey}}" autofocus
               onkeydown="if(event.key==='Escape'){document.getElementById('add-entry-overlay')?.remove()}">
      </div>
        {{end}}
      {{else}}
      <div class="add-entry-row">
        <label class="add-entry-label">{{if .KeyName}}{{.KeyName}}{{else}}name{{end}}</label>
        <input type="text" class="add-entry-input" name="name" required autofocus
               onkeydown="if(event.key==='Escape'){document.getElementById('add-entry-overlay')?.remove()}">
      </div>
      {{end}}
      {{range .Fields}}
      <div class="add-entry-row add-entry-{{.Category}}">
        <label class="add-entry-label">{{.Path}}{{if eq .Category "required"}} <span class="add-entry-req-mark">*</span>{{end}}</label>
        <input type="text" class="add-entry-input" name="field:{{.Path}}"
               {{if .Inherited}}value="{{.Inherited}}"{{end}}
               placeholder="{{if .Placeholder}}{{.Placeholder}}{{end}}"
               {{if eq .Category "required"}}data-required="true"{{end}}>
      </div>
      {{end}}
      <div class="add-entry-actions">
        <button type="submit" class="add-entry-submit">Create</button>
        <button type="button" class="add-entry-cancel" onclick="document.getElementById('add-entry-overlay')?.remove()">Cancel</button>
      </div>
    </form>
  </div>
</div>
{{end}}
