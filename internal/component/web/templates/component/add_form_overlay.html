{{define "add_form_overlay"}}
<div class="add-entry-overlay" id="add-entry-overlay">
  <div class="add-entry-card">
    <h3>New {{.ListName}}</h3>
    <form hx-post="{{.AddURL}}" hx-target="#detail" hx-swap="innerHTML" data-close-on-after-request="true">
      {{if .Keyless}}
        {{if .DisplayKey}}
      <div class="add-entry-row">
        <label class="add-entry-label" for="add-entry-key">{{.DisplayKey}}</label>
        <input type="text" class="add-entry-input" id="add-entry-key" name="field:{{.DisplayKey}}" aria-label="{{.DisplayKey}}" autofocus>
      </div>
        {{end}}
      {{else}}
      <div class="add-entry-row">
        <label class="add-entry-label" for="add-entry-key">{{if .KeyName}}{{.KeyName}}{{else}}name{{end}}</label>
        <input type="text" class="add-entry-input" id="add-entry-key" name="name" aria-label="{{if .KeyName}}{{.KeyName}}{{else}}name{{end}}" required autofocus>
      </div>
      {{end}}
      {{range .Fields}}
      <div class="add-entry-row add-entry-{{.Category}}">
        <label class="add-entry-label">{{.Path}}{{if eq .Category "required"}} <span class="add-entry-req-mark">*</span>{{end}}</label>
        <input type="text" class="add-entry-input" name="field:{{.Path}}"
               {{if .Inherited}}value="{{.Inherited}}"{{end}}
               placeholder="{{if .Placeholder}}{{.Placeholder}}{{end}}"
               {{if eq .Category "required"}}data-required="true"{{end}}>
      </div>
      {{end}}
      <div class="add-entry-actions">
        <button type="submit" class="add-entry-submit">Create</button>
        <button type="button" class="add-entry-cancel" data-action="close-add-overlay">Cancel</button>
      </div>
    </form>
  </div>
</div>
{{end}}
