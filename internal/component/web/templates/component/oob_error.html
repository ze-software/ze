{{define "oob_error"}}
<div id="error-list" hx-swap-oob="beforeend">{{template "error_item" .}}</div>
<aside id="error-panel" hx-swap-oob="className" class="error-panel"></aside>
{{end}}

{{define "error_item"}}
<div class="error-item" id="error-{{.ID}}">
  <b>{{.Path}}</b>
  <span>{{.Message}}</span>
  <button class="error-dismiss" onclick="this.parentNode.remove(); document.dispatchEvent(new Event('ze-error-update'))">x</button>
</div>
{{end}}
