<div class="config-container" id="content-area">
  {{if .Children}}
  <section class="config-section">
    <ul class="config-nav-list">
      {{range .Children}}
      <li>
        <a class="config-nav-link config-nav-{{.Kind}}" href="{{.URL}}">{{.Name}}</a>
      </li>
      {{end}}
    </ul>
  </section>
  {{end}}

  {{if .LeafFields}}
  <section class="config-section">
    <h3 class="config-section-title">Fields</h3>
    <div class="config-fields">
      {{range .LeafFields}}
      <form class="config-field-row" method="POST" action="/config/set/{{$.CurrentPath}}">
        <label class="config-field-name">{{.Name}}</label>
        <input type="hidden" name="leaf" value="{{.Name}}">
        <input type="text" name="value" class="config-field-input"
               value="{{.Value}}"
               placeholder="{{if .Default}}{{.Default}}{{else}}{{.Description}}{{end}}">
        <button type="submit" class="config-btn-set">Set</button>
      </form>
      {{end}}
    </div>
  </section>
  {{end}}
</div>
