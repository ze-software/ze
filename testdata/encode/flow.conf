peer 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 1;
	peer-as 1;
	group-updates false;

	family {
		ipv4 flow;
		ipv4 flow-vpn;
		ipv6 flow;
	}

	flow {
		# 1. first-vpn-route: source 10.0.0.1/32 rd 65535:65536 discard
		route first-vpn-route {
			rd 65535:65536;
			match {
				source 10.0.0.1/32;
			}
			then {
				discard;
			}
		}

		# 2. legal-intercept: source 10.0.0.2/32 next-hop 1.2.3.4 copy-to-nexthop
		route legal-intercept {
			next-hop 1.2.3.4;
			match {
				source 10.0.0.2/32;
			}
			then {
				copy 1.2.3.4;
			}
		}

		# 3. give-me-a-name: dest 10.0.0.2/32 source 10.0.0.1/32 tcp 3128 discard + communities
		route give-me-a-name {
			match {
				source 10.0.0.1/32;
				destination 10.0.0.2/32;
				destination-port =3128;
				protocol tcp;
			}
			then {
				discard;
				community [30740:0 30740:30740];
			}
		}

		# 4. take-action: fragment last-fragment action sample-terminal
		route take-action {
			match {
				fragment [ last-fragment ];
			}
			then {
				action sample-terminal;
			}
		}

		# 5. another: source 10.0.0.0/24 tcp 3128 rate-limit 9600
		route another {
			match {
				source 10.0.0.0/24;
				destination-port =3128;
				protocol tcp;
			}
			then {
				rate-limit 9600;
			}
		}

		# 6. ipv6: dest 2a02:... source ::1 udp traffic-class flow-label discard
		route ipv6 {
			match {
				source ::1/128/120;
				destination 2a02:b80:15::7aca:39ff:feae:a87a/128/0;
				next-header udp;
				traffic-class 101;
				flow-label 2013;
			}
			then {
				discard;
			}
		}

		# 7. set-dscp: packet-length mark 10
		route set-dscp {
			match {
				packet-length [ >200&<300 >400&<500 ];
			}
			then {
				mark 10;
			}
		}

		# 8. a-vpn-route: source 10.0.0.3/32 rd 65535:65536 next-hop 5.6.7.8 redirect-to-nexthop
		route a-vpn-route {
			rd 65535:65536;
			next-hop 5.6.7.8;
			match {
				source 10.0.0.3/32;
			}
			then {
				redirect-to-nexthop;
			}
		}

		# 9. third-redirect: dest 192.168.0.1/32 next-hop 1.2.3.4 redirect-to-nexthop
		route third-redirect {
			next-hop 1.2.3.4;
			match {
				destination 192.168.0.1/32;
			}
			then {
				redirect 1.2.3.4;
			}
		}

		# 10. second-redirect: complex match with redirect:258:33756718
		route second-redirect {
			match {
				source 10.0.0.2/32;
				destination 192.168.0.1/32;
				port [ =80 =8080 ];
				destination-port [ >8080&<8088 =3128];
				source-port >1024;
				protocol [ udp tcp ];
			}
			then {
				redirect 258:33756718;
			}
		}

		# 11. first-redirect: complex match with redirect:65500:12345
		route first-redirect {
			match {
				source 10.0.0.9/32;
				destination 192.168.0.1/32;
				port [ =80 =8080 ];
				destination-port [ >8080&<8088 =3128 ];
				source-port >1024;
				protocol [ udp tcp ];
			}
			then {
				redirect 65500:12345;
			}
		}

		# 12. neq-operator: !=tcp !=ports discard
		route neq-operator {
			match {
				source 10.0.0.10/32;
				destination 192.168.0.1/32;
				port [ !=0 ];
				destination-port [ !=443 ];
				source-port [ !=80 !=8080 ];
				protocol [ !=tcp ];
			}
			then {
				discard;
			}
		}

		# 13. check-tcp-flags: tcp-flags discard
		route check-tcp-flags {
			match {
				source 10.0.0.1/32;
				destination 10.0.0.2/32;
				destination-port =3128;
				protocol tcp;
				tcp-flags [SYN RST&FIN&!=push];
			}
			then {
				discard;
			}
		}
	}
}
